<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<!-- Ogni file CSS si occupa solo di UNA parte della pagina -->

<link rel="stylesheet" href="../css/contatti/contatti-scheda.css">
<link rel="stylesheet" href="../css/contatti/contatti-social.css">

<link rel="stylesheet" href="../css/contatti/footer.css">

<body>

  <header class="navbar">
    <a href="../index.html" class="logo">
      <img src="../image/logo-dinamiche-verticali-formazione.svg" alt="Dinamiche Verticali Formazione" class="logo-img">
    </a>
    <nav>
      <a href="../index.html">FORMAZIONE</a>
      <a href="corsi.html">CORSI</a>
      <a href="news.html">BLOG</a>
      <a href="contatti.html" class="active">CONTATTI</a>
    </nav>

  <div class="banner">
    <h1>Contattaci</h1>
    <p id="bannerSub"></p>
  </div>

  <section class="contatti-content">
    <div class="contatti-card">
      <h2>I nostri riferimenti</h2>
      <div class="riga"><span class="ic">&#128205;</span><span id="cIndirizzo"></span></div>
      <div class="riga"><span class="ic">&#128222;</span><span id="cTelefono"></span></div>
      <div class="riga"><span class="ic">&#9993;&#65039;</span><span id="cEmail"></span></div>
      <div class="riga"><span class="ic">&#128337;</span><span id="cOrari"></span></div>
      <ul class="note-lista" id="cNote"></ul>

      <div class="referente" id="cReferente"></div>

      <div class="social-block">
        <h3>Seguici</h3>
        <div id="cSocial" class="social-links"></div>
      </div>
    </div>

    <div class="contatti-mappa">
      <div class="mappa-placeholder">
        <p>&#128205; Via G. Battista Feroggio, 54 &ndash; 10151 Torino</p>
        <a id="mappaLink" href="#" target="_blank" rel="noopener" class="btn-mappa">Apri in Google Maps &rarr;</a>
      </div>
    </div>
  </section>

  <footer>
    <img src="../image/logo-dinamiche-verticali-formazione_1.svg" alt="Dinamiche Verticali Formazione" class="footer-logo-semplice">
    <p>&copy; 2026 Formazione Verticale - progetto in sviluppo</p>

  <!-- Ogni file JS si occupa solo di UNA parte della pagina.
