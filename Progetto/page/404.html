<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina non trovata (404) - Dinamiche Verticali Formazione</title>
<meta name="description" content="La pagina che cerchi non esiste o è stata spostata. Torna alla home di Dinamiche Verticali Formazione o esplora i nostri corsi.">
<meta name="robots" content="noindex, follow">
<style>
  :root {
    --dark: #241c15;
    --orange: #e8935a;
    --orange-2: #f0a868;
    --cream: #fbf1e7;
    --text-muted: #8a8378;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    color: var(--dark);
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    padding: 24px;
  }
  .box { max-width: 560px; }
  .code {
    font-size: 96px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1;
  }
  h1 { font-size: 26px; margin: 16px 0 12px; }
  p { color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    display: inline-block;
    padding: 12px 22px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
  }
  a.btn-primary { background: var(--orange); color: #fff; }
  a.btn-primary:hover { background: var(--orange-2); }
  a.btn-secondary { background: transparent; color: var(--dark); border: 1px solid var(--dark); }
  a.btn-secondary:hover { background: var(--dark); color: #fff; }
</style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Pagina non trovata</h1>
    <p>La pagina che stai cercando non esiste oppure è stata spostata. Prova a tornare alla home o a consultare l'elenco dei nostri corsi.</p>
    <div class="links">
      <a class="btn btn-primary" href="/">Torna alla home</a>
      <a class="btn btn-secondary" href="/page/corsi.html">Vedi i corsi</a>
      <a class="btn btn-secondary" href="/page/contatti.html">Contattaci</a>
    </div>
  </div>
</body>
</html>
